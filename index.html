<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDFJ 联机对决</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
        body{background:#fdf2f2;padding:12px;max-width:500px;margin:0 auto;color:#333}
        .card-box{background:white;padding:15px;border-radius:12px;box-shadow:0 4px 12px rgba(217,42,42,0.1);margin-bottom:12px}
        .title{text-align:center;color:#d92a2a;margin-bottom:10px;font-size:20px}
        
        /* 联机区域 */
        .conn-area{background:#fff;border:1px solid #ffcccc}
        .id-text{font-size:12px;background:#eee;padding:5px;border-radius:4px;word-break:all;display:block;margin:5px 0}
        input{padding:8px;border:1px solid #ddd;border-radius:6px;width:100%;margin-bottom:8px}
        
        /* 游戏区域 */
        .status-bar{display:flex;justify-content:space-between;font-size:13px;font-weight:bold;color:#d92a2a;margin-bottom:8px}
        .desktop{min-height:100px;border:2px dashed #d92a2a;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px 0;background:#fff5f5;padding:10px}
        
        /* 牌阵 */
        .cards{display:flex;flex-wrap:wrap;gap:6px;margin:15px 0;justify-content:center}
        .card{padding:8px 10px;background:white;border:2px solid #d92a2a;border-radius:6px;cursor:pointer;font-size:13px;transition:0.2s}
        .card.selected{background:#d92a2a;color:white;transform:translateY(-5px)}
        
        /* 控制按钮 */
        .controls{display:grid;grid-template-columns: 1fr 1fr;gap:8px}
        button{padding:12px;border-radius:8px;border:none;background:#d92a2a;color:white;font-weight:bold;cursor:pointer;transition:0.3s}
        button:disabled{background:#ccc;cursor:not-allowed}
        .btn-full{grid-column: span 2}
        .btn-start{background:#28a745}

        #log{font-size:11px;color:#888;margin-top:10px;background:#eee;padding:8px;border-radius:6px;height:60px;overflow-y:auto}
    </style>
</head>
<body>

<h2 class="title">🎴 SDFJ 嘴炮联机版</h2>

<div class="card-box conn-area" id="setupArea">
    <p>1. 你的ID（点击复制给朋友）:</p>
    <code class="id-text" id="myId" onclick="copyId()">正在获取...</code>
    <input type="text" id="peerIdInput" placeholder="输入对方的ID">
    <button class="btn-full" onclick="connectToPeer()">连接朋友</button>
</div>

<div class="card-box" id="gameArea" style="display:none">
    <div class="status-bar">
        <span id="roleDisplay">角色：加载中</span>
        <span id="turnDisplay">等待开始</span>
    </div>
    
    <div class="desktop" id="desktop">
        <div id="tableCards" style="font-weight:bold;font-size:16px;text-align:center">等待发牌...</div>
    </div>

    <div class="controls">
        <button id="btnStart" class="btn-full btn-start" onclick="dealCards()">🎲 洗牌并给双方发牌</button>
        <button id="btnPlay" disabled onclick="play()">出牌</button>
        <button id="btnCancel" disabled onclick="cancelSelect()">重选</button>
        <button id="btnAgree" disabled onclick="decide(true)">同意(牌消失)</button>
        <button id="btnReject" disabled onclick="decide(false)">驳回(拿回去)</button>
    </div>
</div>

<div class="cards" id="handContainer"></div>

<div id="log">系统日志：等待初始化...</div>

<script>
const ALL_CARDS = [
    "王俊凯","王源","易烊千玺",
    "马嘉祺","丁程鑫","宋亚轩","刘耀文","张真源","严浩翔","贺峻霖",
    "朱志鑫","左航","张极","张泽禹","苏新皓","邓佳鑫","余宇涵","童禹坤","张峻豪","穆祉丞","张子墨",
    "黄朔","官俊臣","张桂源","杨博文","左奇涵","张函瑞","王橹杰","杨涵博","魏子宸", "李煜东","陈思罕","聂伟宸","陈奕恒","陈浚铭",
    "李飞","黄锐"
];


let peer = new Peer();
let conn = null;
let myHand = [];
let selected = [];
let isMyTurn = false;
let onTable = [];

// 日志系统
function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

function copyId() {
    const id = document.getElementById('myId').innerText;
    navigator.clipboard.writeText(id);
    alert("ID已复制，发给朋友吧！");
}

// 1. 初始化 ID
peer.on('open', (id) => {
    document.getElementById('myId').innerText = id;
    log("我的ID已生成，可以连接了");
});

// 2. 监听连接
peer.on('connection', (c) => {
    conn = c;
    log("收到连接请求...");
    setupConn();
});

// 3. 发起连接
function connectToPeer() {
    const id = document.getElementById('peerIdInput').value.trim();
    if(!id) return alert("请输入ID");
    conn = peer.connect(id);
    log("正在尝试连接对方...");
    setupConn();
}

function setupConn() {
    conn.on('open', () => {
        log("✅ 连接成功！");
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        document.getElementById('roleDisplay').innerText = "已连通";
        render();
    });

    conn.on('data', (data) => {
        log(`收到数据: ${data.type}`);
        handleData(data);
    });
}

// 4. 发牌逻辑
function dealCards() {
    log("开始洗牌...");
    const shuffled = [...ALL_CARDS].sort(() => Math.random() - 0.5);
    const p1 = shuffled.slice(0, 18);
    const p2 = shuffled.slice(18);
    const first = Math.random() > 0.5;

    // 自己作为发牌方默认是 P1
    myHand = p1;
    isMyTurn = first;
    onTable = [];
    
    // 通知对方
    conn.send({ type: 'INIT', hand: p2, turn: !first });
    render();
}

function handleData(data) {
    if (data.type === 'INIT') {
        myHand = data.hand;
        isMyTurn = data.turn;
        onTable = [];
        log("牌已收到，游戏开始！");
    } else if (data.type === 'PLAY') {
        onTable = data.cards;
        log("对方出牌了，请审核");
    } else if (data.type === 'DECIDE') {
        if (data.agreed) {
            log("对方同意，出牌成功！");
            myHand = myHand.filter(c => !onTable.includes(c));
            onTable = [];
            isMyTurn = false; // 轮到对方
        } else {
            log("对方驳回，牌回手中！");
            onTable = [];
            isMyTurn = true; // 还是我的回合
        }
    }
    render();
}

function render() {
    // 渲染手牌
    const container = document.getElementById('handContainer');
    container.innerHTML = "";
    myHand.forEach(card => {
        const d = document.createElement('div');
        d.className = `card ${selected.includes(card) ? 'selected' : ''}`;
        d.innerText = card;
        d.onclick = () => {
            if(!isMyTurn || onTable.length > 0) return;
            if(selected.includes(card)) selected = selected.filter(c => c!==card);
            else if(selected.length < 4) selected.push(card);
            render();
        };
        container.appendChild(d);
    });

    // 桌面显示
    const table = document.getElementById('tableCards');
    if (onTable.length > 0) {
        table.innerHTML = `<span style="color:#666">正在出牌：</span><br>${onTable.join(" | ")}`;
    } else {
        table.innerText = isMyTurn ? "请选择1-4张牌出牌" : "等待对方出牌...";
    }

    // 按钮状态
    document.getElementById('turnDisplay').innerText = isMyTurn ? "🔴 你的回合" : "⚪ 对方回合";
    document.getElementById('btnPlay').disabled = !isMyTurn || selected.length === 0 || onTable.length > 0;
    document.getElementById('btnCancel').disabled = selected.length === 0 || onTable.length > 0;
    document.getElementById('btnAgree').disabled = isMyTurn || onTable.length === 0;
    document.getElementById('btnReject').disabled = isMyTurn || onTable.length === 0;

    if (myHand.length === 0 && ALL_CARDS.length > 0 && myHand !== null) {
        log("🎉 恭喜你赢了！");
        table.innerText = "🏆 你赢了！";
    }
}

function play() {
    onTable = [...selected];
    conn.send({ type: 'PLAY', cards: onTable });
    selected = [];
    render();
}

function cancelSelect() {
    selected = [];
    render();
}

function decide(agreed) {
    conn.send({ type: 'DECIDE', agreed: agreed });
    if (agreed) {
        onTable = [];
        isMyTurn = true; // 我同意了，轮到我出
    } else {
        onTable = [];
        isMyTurn = false; // 我驳回了，还是对方出
    }
    render();
}
</script>
</body>
</html>
